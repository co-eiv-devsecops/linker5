name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Compile application
        run: mvn -B -f linker5-java/pom.xml clean compile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Run tests
        run: mvn -B -f linker5-java/pom.xml test

  integration-test:
    name: Integration Tests (Ephemeral Environment)
    runs-on: ubuntu-latest
    needs: test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: linker_test
          MYSQL_USER: linker
          MYSQL_PASSWORD: linker_test_pwd
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_DATABASE: linker_test
      MYSQL_USER: linker
      MYSQL_PWD: linker_test_pwd
      PORT: 8080
      LINKER_LOG_LEVEL: INFO
      FEATURE_REDIRECTS_ENABLED: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build jar
        run: mvn -B -f linker5-java/pom.xml package -DskipTests

      - name: Start Linker against the ephemeral MySQL
        run: |
          set -euo pipefail
          JAR="$(find linker5-java/target -name '*-jar-with-dependencies.jar' | head -n1)"
          nohup java -jar "$JAR" > linker.log 2>&1 &
          echo $! > linker.pid

      - name: Wait for the app to become healthy
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null 2>&1; then
              echo "App is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time"
          cat linker.log || true
          exit 1

      - name: Functional and integration tests
        run: |
          set -euo pipefail

          echo "Creating a short link..."
          CREATE_RESPONSE="$(curl -fsS -X POST http://127.0.0.1:8080/link \
            -H "Content-Type: application/json" \
            -d '{"url":"https://www.google.com"}')"
          echo "Response: $CREATE_RESPONSE"

          SHORT_ID="$(printf '%s' "$CREATE_RESPONSE" | jq -r '.id')"
          if [ -z "$SHORT_ID" ] || [ "$SHORT_ID" = "null" ]; then
            echo "No id returned in create response"
            exit 1
          fi

          echo "Following redirect for id=$SHORT_ID..."
          LOCATION="$(curl -s -o /dev/null -D - http://127.0.0.1:8080/$SHORT_ID | grep -i '^location:' | tr -d '\r')"
          echo "$LOCATION" | grep -q "https://www.google.com"

          echo "Requesting an unknown id returns 404..."
          STATUS="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/does-not-exist)"
          [ "$STATUS" = "404" ]

          echo "Posting an invalid payload returns 400..."
          STATUS="$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:8080/link \
            -H "Content-Type: application/json" \
            -d '{}')"
          [ "$STATUS" = "400" ]

          echo "All integration checks passed"

      - name: Dump app logs
        if: failure()
        run: cat linker.log || true

      - name: Stop the app
        if: always()
        run: kill "$(cat linker.pid)" 2>/dev/null || true

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: [test, integration-test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish package to GitHub Packages
        if: github.event_name == 'push'
        run: mvn -B -f linker5-java/pom.xml deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Upload executable jar
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: linker-app
          path: linker5-java/target/*-jar-with-dependencies.jar
          if-no-files-found: error

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push'

    environment:
      name: production

    env:
      DEPLOYMENT_PRIVATE_KEY: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      DEPLOYMENT_PUBLIC_KEY: ${{ secrets.DEPLOYMENT_PUBLIC_KEY }}
      OCI_CLI_REGION: ${{ vars.OCI_CLI_REGION }}
      OCI_BASTION_OCID: ${{ vars.OCI_BASTION_OCID }}
      OCI_INSTANCE_OCID: ${{ vars.OCI_INSTANCE_OCID }}
      OTEL_SERVICE_NAME: linker5-java
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/traces
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/metrics
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/logs
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
      MYSQL_USER: ${{ secrets.MYSQL_USER }}
      MYSQL_PWD: ${{ secrets.MYSQL_PWD }}

    steps:
      - name: Deploy to OCI VM
        uses: co-eiv-devsecops/material-curso/actions/oci-bastion-deploy@main
        with:
          ssh-public-key: ${{ env.DEPLOYMENT_PUBLIC_KEY }}
          bastion-id: ${{ vars.OCI_BASTION_OCID }}
          instance-id: ${{ env.OCI_INSTANCE_OCID }}
          artifact-name: linker-app
          target-path: /tmp/deploy/linker/${{ github.sha }}
          target-os-username: ubuntu
          oci-cli-cache-version: v1
          script: |
            set -euo pipefail

            DEPLOY_DIR="/tmp/deploy/linker/${{ github.sha }}"
            JAR="$(find "$DEPLOY_DIR" -name '*-jar-with-dependencies.jar' | head -n1)"

            if [ -z "$JAR" ] || [ ! -f "$JAR" ]; then
              echo "No deployable jar found under $DEPLOY_DIR"
              ls -la "$DEPLOY_DIR" || true
              exit 1
            fi
            echo "Deploying artifact: $JAR"

            OTEL_EXPORTER_OTLP_HEADERS_VALUE=$(cat <<'EOF'
            ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
            EOF
            )
            MYSQL_HOST_VALUE=$(cat <<'EOF'
            ${{ secrets.MYSQL_HOST }}
            EOF
            )
            MYSQL_DATABASE_VALUE=$(cat <<'EOF'
            ${{ secrets.MYSQL_DATABASE }}
            EOF
            )
            MYSQL_USER_VALUE=$(cat <<'EOF'
            ${{ secrets.MYSQL_USER }}
            EOF
            )
            MYSQL_PWD_VALUE=$(cat <<'EOF'
            ${{ secrets.MYSQL_PWD }}
            EOF
            )

            escape_systemd_value() {
              printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
            }

            OTEL_EXPORTER_OTLP_HEADERS_ESCAPED="$(escape_systemd_value "$OTEL_EXPORTER_OTLP_HEADERS_VALUE")"
            MYSQL_HOST_ESCAPED="$(escape_systemd_value "$MYSQL_HOST_VALUE")"
            MYSQL_DATABASE_ESCAPED="$(escape_systemd_value "$MYSQL_DATABASE_VALUE")"
            MYSQL_USER_ESCAPED="$(escape_systemd_value "$MYSQL_USER_VALUE")"
            MYSQL_PWD_ESCAPED="$(escape_systemd_value "$MYSQL_PWD_VALUE")"

            # Always (re)install the unit so ExecStart points at the deployed jar.
            # A pre-existing unit on the VM pointed elsewhere, so the old jar kept running.
            echo "Installing/updating linker.service unit..."
            sudo tee /etc/systemd/system/linker.service > /dev/null <<UNIT
            [Unit]
            Description=Linker URL Shortener
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            User=ubuntu
            WorkingDirectory=/home/ubuntu
            Environment=PORT=8080
            Environment=LINKER_LOG_LEVEL=INFO
            Environment=LINKER_OTEL_LOG_EXPORT=true
            Environment=FEATURE_REDIRECTS_ENABLED=true
            Environment=OTEL_SERVICE_NAME=linker5-java
            Environment=OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
            Environment=OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/traces
            Environment=OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/metrics
            Environment=OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/logs
            Environment="OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS_ESCAPED}"
            Environment="MYSQL_HOST=${MYSQL_HOST_ESCAPED}"
            Environment="MYSQL_DATABASE=${MYSQL_DATABASE_ESCAPED}"
            Environment="MYSQL_USER=${MYSQL_USER_ESCAPED}"
            Environment="MYSQL_PWD=${MYSQL_PWD_ESCAPED}"
            ExecStart=/usr/bin/java -jar /home/ubuntu/linker.jar
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            UNIT
            sudo systemctl daemon-reload
            sudo systemctl enable linker.service

            # Publish the new jar to the stable path the service runs from
            sudo systemctl stop linker.service || true
            sudo install -m 644 -o ubuntu -g ubuntu "$JAR" /home/ubuntu/linker.jar
            sudo systemctl restart linker.service

            # Healthcheck: wait for the app to answer on :8080
            echo "Waiting for the app to become healthy..."
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:8080/ >/dev/null 2>&1; then
                echo "Deployment OK - app responding on :8080"
                sudo systemctl status linker.service --no-pager || true
                exit 0
              fi
              sleep 3
            done

            echo "Healthcheck failed"
            sudo journalctl -u linker.service -n 60 --no-pager || true
            exit 1
