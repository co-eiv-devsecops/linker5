name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Compile application
        run: mvn -B -f linker5-java/pom.xml clean compile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Run tests
        run: mvn -B -f linker5-java/pom.xml test

  integration-test:
    name: Integration Tests (Ephemeral Environment)
    runs-on: ubuntu-latest
    needs: test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: linker_test
          MYSQL_USER: linker
          MYSQL_PASSWORD: linker_test_pwd
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_DATABASE: linker_test
      MYSQL_USER: linker
      MYSQL_PWD: linker_test_pwd
      PORT: 8080
      LINKER_LOG_LEVEL: INFO
      FEATURE_REDIRECTS_ENABLED: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run ephemeral environment integration flow
        uses: ./.github/actions/integration-test-ephemeral

  package-oci:
    name: Package OCI VM artifact
    runs-on: ubuntu-latest
    needs: [test, integration-test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish package to GitHub Packages
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: mvn -B -f linker5-java/pom.xml deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Package OCI VM artifact
        uses: ./.github/actions/package-oci

      - name: Upload executable jar
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v7
        with:
          name: linker-oci-vm-artifact
          path: linker5-java/target/*-jar-with-dependencies.jar
          if-no-files-found: error

  package-azure:
    name: Package Azure Functions artifact
    runs-on: ubuntu-latest
    needs: [test, integration-test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Package Azure Functions artifact
        uses: ./.github/actions/package-azure
        with:
          azure-function-app-name: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          azure-resource-group: ${{ vars.AZURE_RESOURCE_GROUP }}
          azure-region: ${{ vars.AZURE_REGION || 'mexicocentral' }}

      - name: Upload Azure Functions package
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v7
        with:
          name: linker-azure-functions-artifact
          path: linker5-java/target/azure-functions/${{ vars.AZURE_FUNCTION_APP_NAME }}/**
          if-no-files-found: error

  deploy-oci:
    name: Deploy to OCI VM
    runs-on: ubuntu-latest
    needs: package-oci
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy to OCI VM
        uses: ./.github/actions/deploy-oci
        with:
          deployment-private-key: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}
          deployment-public-key: ${{ secrets.DEPLOYMENT_PUBLIC_KEY }}
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          oci-cli-region: ${{ vars.OCI_CLI_REGION }}
          oci-bastion-ocid: ${{ vars.OCI_BASTION_OCID }}
          oci-instance-ocid: ${{ vars.OCI_INSTANCE_OCID }}
          otel-service-name: linker5-java
          otel-resource-attributes: deployment.environment=oci,cloud.provider=oracle
          otel-exporter-otlp-protocol: http/protobuf
          otel-exporter-otlp-traces-endpoint: https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/traces
          otel-exporter-otlp-metrics-endpoint: https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/metrics
          otel-exporter-otlp-logs-endpoint: https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/logs
          otel-exporter-otlp-headers: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
          mysql-host: ${{ secrets.MYSQL_HOST }}
          mysql-database: ${{ secrets.MYSQL_DATABASE }}
          mysql-user: ${{ secrets.MYSQL_USER }}
          mysql-pwd: ${{ secrets.MYSQL_PWD }}
          artifact-name: linker-oci-vm-artifact
          target-path: /tmp/deploy/linker/${{ github.sha }}
          target-os-username: ubuntu

  verify-oci:
    name: Verify OCI VM deployment
    runs-on: ubuntu-latest
    needs: deploy-oci
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify OCI VM routes
        uses: ./.github/actions/verify-oci
        with:
          deployment-private-key: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}
          deployment-public-key: ${{ secrets.DEPLOYMENT_PUBLIC_KEY }}
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          oci-cli-region: ${{ vars.OCI_CLI_REGION }}
          oci-bastion-ocid: ${{ vars.OCI_BASTION_OCID }}
          oci-instance-ocid: ${{ vars.OCI_INSTANCE_OCID }}
          artifact-name: linker-oci-vm-artifact
          target-path: /tmp/deploy/linker/${{ github.sha }}
          target-os-username: ubuntu

  deploy-azure:
    name: Deploy to Azure Functions
    runs-on: ubuntu-latest
    needs: package-azure
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy Azure Function package
        uses: ./.github/actions/deploy-azure
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          function-app-name: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          resource-group: ${{ vars.AZURE_RESOURCE_GROUP }}
          azure-mysql-host: ${{ secrets.AZURE_MYSQL_HOST }}
          azure-mysql-database: ${{ secrets.AZURE_MYSQL_DATABASE }}
          azure-mysql-user: ${{ secrets.AZURE_MYSQL_USER }}
          azure-mysql-pwd: ${{ secrets.AZURE_MYSQL_PWD }}
          artifact-name: linker-azure-functions-artifact
          package-path: linker5-java/target/azure-functions/${{ vars.AZURE_FUNCTION_APP_NAME }}
          otel-exporter-otlp-headers: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

  verify-azure:
    name: Verify Azure Functions deployment
    runs-on: ubuntu-latest
    needs: deploy-azure
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify Azure Function routes
        uses: ./.github/actions/verify-azure-routes
        with:
          base-url: https://${{ vars.AZURE_FUNCTION_APP_NAME }}.azurewebsites.net

  verify-observability-oci:
    name: Verify OCI VM observability configuration and traffic
    runs-on: ubuntu-latest
    needs: verify-oci
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify OCI VM OTEL settings and emit synthetic traffic
        uses: ./.github/actions/verify-oci-observability
        with:
          deployment-private-key: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}
          deployment-public-key: ${{ secrets.DEPLOYMENT_PUBLIC_KEY }}
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          oci-cli-region: ${{ vars.OCI_CLI_REGION }}
          oci-bastion-ocid: ${{ vars.OCI_BASTION_OCID }}
          oci-instance-ocid: ${{ vars.OCI_INSTANCE_OCID }}
          artifact-name: linker-oci-vm-artifact
          target-path: /tmp/deploy/linker/${{ github.sha }}
          target-os-username: ubuntu

  verify-observability-azure:
    name: Verify Azure Functions observability configuration and traffic
    runs-on: ubuntu-latest
    needs: verify-azure
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify Azure Function OTEL settings and emit synthetic traffic
        uses: ./.github/actions/verify-azure-observability
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          function-app-name: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          resource-group: ${{ vars.AZURE_RESOURCE_GROUP }}
