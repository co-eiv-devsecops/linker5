name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Compile application
        run: mvn -B -f linker5-java/pom.xml clean compile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Run tests
        run: mvn -B -f linker5-java/pom.xml test

  integration-test:
    name: Integration Tests (Ephemeral Environment)
    runs-on: ubuntu-latest
    needs: test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: linker_test
          MYSQL_USER: linker
          MYSQL_PASSWORD: linker_test_pwd
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_DATABASE: linker_test
      MYSQL_USER: linker
      MYSQL_PWD: linker_test_pwd
      PORT: 8080
      LINKER_LOG_LEVEL: INFO
      FEATURE_REDIRECTS_ENABLED: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build jar
        run: mvn -B -f linker5-java/pom.xml package -DskipTests

      - name: Start Linker against the ephemeral MySQL
        run: |
          set -euo pipefail
          JAR="$(find linker5-java/target -name '*-jar-with-dependencies.jar' | head -n1)"
          nohup java -jar "$JAR" > linker.log 2>&1 &
          echo $! > linker.pid

      - name: Wait for the app to become healthy
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null 2>&1; then
              echo "App is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time"
          cat linker.log || true
          exit 1

      - name: Functional and integration tests
        run: |
          set -euo pipefail

          echo "Creating a short link..."
          CREATE_RESPONSE="$(curl -fsS -X POST http://127.0.0.1:8080/link \
            -H "Content-Type: application/json" \
            -d '{"url":"https://www.google.com"}')"
          echo "Response: $CREATE_RESPONSE"

          SHORT_ID="$(printf '%s' "$CREATE_RESPONSE" | jq -r '.id')"
          if [ -z "$SHORT_ID" ] || [ "$SHORT_ID" = "null" ]; then
            echo "No id returned in create response"
            exit 1
          fi

          echo "Following redirect for id=$SHORT_ID..."
          LOCATION="$(curl -s -o /dev/null -D - http://127.0.0.1:8080/$SHORT_ID | grep -i '^location:' | tr -d '\r')"
          echo "$LOCATION" | grep -q "https://www.google.com"

          echo "Requesting an unknown id returns 404..."
          STATUS="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/does-not-exist)"
          [ "$STATUS" = "404" ]

          echo "Posting an invalid payload returns 400..."
          STATUS="$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:8080/link \
            -H "Content-Type: application/json" \
            -d '{}')"
          [ "$STATUS" = "400" ]

          echo "All integration checks passed"

      - name: Dump app logs
        if: failure()
        run: cat linker.log || true

      - name: Stop the app
        if: always()
        run: kill "$(cat linker.pid)" 2>/dev/null || true

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: [test, integration-test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish package to GitHub Packages
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: mvn -B -f linker5-java/pom.xml deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Upload executable jar
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v7
        with:
          name: linker-app
          path: linker5-java/target/*-jar-with-dependencies.jar
          if-no-files-found: error

  package-azure:
    name: Package Azure Function
    runs-on: ubuntu-latest
    needs: [test, integration-test]

    env:
      AZURE_FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTION_APP_NAME }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_REGION: ${{ vars.AZURE_REGION || 'mexicocentral' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Package Azure Functions artifact
        run: >-
          mvn -B -f linker5-java/pom.xml -DskipTests package
          -Dazure.functions.appName="${AZURE_FUNCTION_APP_NAME}"
          -Dazure.functions.resourceGroup="${AZURE_RESOURCE_GROUP}"
          -Dazure.functions.region="${AZURE_REGION}"
          azure-functions:package

      - name: Verify Azure package output exists
        run: |
          set -euo pipefail
          OUTPUT_DIR="linker5-java/target/azure-functions/${AZURE_FUNCTION_APP_NAME}"
          if [ ! -d "$OUTPUT_DIR" ]; then
            echo "Azure Functions package directory was not generated: $OUTPUT_DIR"
            find linker5-java/target -maxdepth 3 -type d | sort || true
            exit 1
          fi
          test -f "$OUTPUT_DIR/host.json"

      - name: Upload Azure Functions package
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v7
        with:
          name: linker-azure-function
          path: linker5-java/target/azure-functions/${{ vars.AZURE_FUNCTION_APP_NAME }}/**
          if-no-files-found: error

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    environment:
      name: production

    env:
      DEPLOYMENT_PRIVATE_KEY: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      DEPLOYMENT_PUBLIC_KEY: ${{ secrets.DEPLOYMENT_PUBLIC_KEY }}
      OCI_CLI_REGION: ${{ vars.OCI_CLI_REGION }}
      OCI_BASTION_OCID: ${{ vars.OCI_BASTION_OCID }}
      OCI_INSTANCE_OCID: ${{ vars.OCI_INSTANCE_OCID }}
      OTEL_SERVICE_NAME: linker5-java
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/traces
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/metrics
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/logs
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
      MYSQL_USER: ${{ secrets.MYSQL_USER }}
      MYSQL_PWD: ${{ secrets.MYSQL_PWD }}

    steps:
      - name: Deploy to OCI VM
        uses: co-eiv-devsecops/material-curso/actions/oci-bastion-deploy@main
        with:
          ssh-public-key: ${{ env.DEPLOYMENT_PUBLIC_KEY }}
          bastion-id: ${{ vars.OCI_BASTION_OCID }}
          instance-id: ${{ env.OCI_INSTANCE_OCID }}
          artifact-name: linker-app
          target-path: /tmp/deploy/linker/${{ github.sha }}
          target-os-username: ubuntu
          oci-cli-cache-version: v1
          script: |
            set -euo pipefail

            DEPLOY_DIR="/tmp/deploy/linker/${{ github.sha }}"
            JAR="$(find "$DEPLOY_DIR" -name '*-jar-with-dependencies.jar' | head -n1)"

            if [ -z "$JAR" ] || [ ! -f "$JAR" ]; then
              echo "No deployable jar found under $DEPLOY_DIR"
              ls -la "$DEPLOY_DIR" || true
              exit 1
            fi
            echo "Deploying artifact: $JAR"

            OTEL_EXPORTER_OTLP_HEADERS_VALUE=$(cat <<'EOF'
            ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
            EOF
            )
            MYSQL_HOST_VALUE=$(cat <<'EOF'
            ${{ secrets.MYSQL_HOST }}
            EOF
            )
            MYSQL_DATABASE_VALUE=$(cat <<'EOF'
            ${{ secrets.MYSQL_DATABASE }}
            EOF
            )
            MYSQL_USER_VALUE=$(cat <<'EOF'
            ${{ secrets.MYSQL_USER }}
            EOF
            )
            MYSQL_PWD_VALUE=$(cat <<'EOF'
            ${{ secrets.MYSQL_PWD }}
            EOF
            )

            escape_systemd_value() {
              printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
            }

            OTEL_EXPORTER_OTLP_HEADERS_ESCAPED="$(escape_systemd_value "$OTEL_EXPORTER_OTLP_HEADERS_VALUE")"
            MYSQL_HOST_ESCAPED="$(escape_systemd_value "$MYSQL_HOST_VALUE")"
            MYSQL_DATABASE_ESCAPED="$(escape_systemd_value "$MYSQL_DATABASE_VALUE")"
            MYSQL_USER_ESCAPED="$(escape_systemd_value "$MYSQL_USER_VALUE")"
            MYSQL_PWD_ESCAPED="$(escape_systemd_value "$MYSQL_PWD_VALUE")"

            # Always (re)install the unit so ExecStart points at the deployed jar.
            # A pre-existing unit on the VM pointed elsewhere, so the old jar kept running.
            echo "Installing/updating linker.service unit..."
            sudo tee /etc/systemd/system/linker.service > /dev/null <<UNIT
            [Unit]
            Description=Linker URL Shortener
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            User=ubuntu
            WorkingDirectory=/home/ubuntu
            Environment=PORT=8080
            Environment=LINKER_LOG_LEVEL=INFO
            Environment=LINKER_OTEL_LOG_EXPORT=true
            Environment=FEATURE_REDIRECTS_ENABLED=true
            Environment=OTEL_SERVICE_NAME=linker5-java
            Environment=OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
            Environment=OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/traces
            Environment=OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/metrics
            Environment=OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=https://otlp-gateway-prod-us-east-3.grafana.net/otlp/v1/logs
            Environment="OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS_ESCAPED}"
            Environment="MYSQL_HOST=${MYSQL_HOST_ESCAPED}"
            Environment="MYSQL_DATABASE=${MYSQL_DATABASE_ESCAPED}"
            Environment="MYSQL_USER=${MYSQL_USER_ESCAPED}"
            Environment="MYSQL_PWD=${MYSQL_PWD_ESCAPED}"
            ExecStart=/usr/bin/java -jar /home/ubuntu/linker.jar
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            UNIT
            sudo systemctl daemon-reload
            sudo systemctl enable linker.service

            # Publish the new jar to the stable path the service runs from
            sudo systemctl stop linker.service || true
            sudo install -m 644 -o ubuntu -g ubuntu "$JAR" /home/ubuntu/linker.jar
            sudo systemctl restart linker.service

            # Healthcheck: wait for the app to answer on :8080
            echo "Waiting for the app to become healthy..."
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:8080/ >/dev/null 2>&1; then
                echo "Deployment OK - app responding on :8080"
                sudo systemctl status linker.service --no-pager || true
                exit 0
              fi
              sleep 3
            done

            echo "Healthcheck failed"
            sudo journalctl -u linker.service -n 60 --no-pager || true
            exit 1

  deploy-azure:
    name: Deploy to Azure Functions
    runs-on: ubuntu-latest
    needs: package-azure
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    environment:
      name: production

    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTION_APP_NAME }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_REGION: ${{ vars.AZURE_REGION || 'mexicocentral' }}
      AZURE_MYSQL_HOST: ${{ secrets.AZURE_MYSQL_HOST }}
      AZURE_MYSQL_DATABASE: ${{ secrets.AZURE_MYSQL_DATABASE }}
      AZURE_MYSQL_USER: ${{ secrets.AZURE_MYSQL_USER }}
      AZURE_MYSQL_PWD: ${{ secrets.AZURE_MYSQL_PWD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Azure Functions package
        uses: actions/download-artifact@v5
        with:
          name: linker-azure-function
          path: linker5-java/target/azure-functions/${{ vars.AZURE_FUNCTION_APP_NAME }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sync Azure Function app settings
        run: >-
          az functionapp config appsettings set
          --name "${AZURE_FUNCTION_APP_NAME}"
          --resource-group "${AZURE_RESOURCE_GROUP}"
          --settings
          AZURE_MYSQL_HOST="${AZURE_MYSQL_HOST}"
          AZURE_MYSQL_DATABASE="${AZURE_MYSQL_DATABASE}"
          AZURE_MYSQL_USER="${AZURE_MYSQL_USER}"
          AZURE_MYSQL_PWD="${AZURE_MYSQL_PWD}"
          FEATURE_REDIRECTS_ENABLED=true
          LINKER_LOG_LEVEL=INFO
          AzureWebJobsDisableHomepage=true

      - name: Deploy Azure Function package
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          package: linker5-java/target/azure-functions/${{ vars.AZURE_FUNCTION_APP_NAME }}

  verify-azure:
    name: Verify Azure Functions deployment
    runs-on: ubuntu-latest
    needs: deploy-azure
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    env:
      AZURE_FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTION_APP_NAME }}

    steps:
      - name: Wait for Azure Function app health
        run: |
          set -euo pipefail
          BASE_URL="https://${AZURE_FUNCTION_APP_NAME}.azurewebsites.net"
          for i in $(seq 1 30); do
            if curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Verify Azure Function routes
        run: |
          set -euo pipefail
          BASE_URL="https://${AZURE_FUNCTION_APP_NAME}.azurewebsites.net"

          ROOT_CONTENT_TYPE="$(curl -s -o /tmp/linker-root.html -D - "${BASE_URL}/" | grep -i '^content-type:' | tr -d '\r')"
          echo "$ROOT_CONTENT_TYPE" | grep -qi 'text/html'
          grep -q '<title>Linker</title>' /tmp/linker-root.html

          CSS_CONTENT_TYPE="$(curl -s -o /tmp/linker-style.css -D - "${BASE_URL}/css/style.css" | grep -i '^content-type:' | tr -d '\r')"
          echo "$CSS_CONTENT_TYPE" | grep -qi 'text/css'

          JS_CONTENT_TYPE="$(curl -s -o /tmp/linker-app.js -D - "${BASE_URL}/js/app.js" | grep -i '^content-type:' | tr -d '\r')"
          echo "$JS_CONTENT_TYPE" | grep -qi 'application/javascript'

          CREATE_RESPONSE="$(curl -fsS -X POST "${BASE_URL}/link" -H "Content-Type: application/json" -d '{"url":"https://www.google.com"}')"
          SHORT_ID="$(printf '%s' "$CREATE_RESPONSE" | jq -r '.id')"
          [ -n "$SHORT_ID" ] && [ "$SHORT_ID" != "null" ]

          LOCATION="$(curl -s -o /dev/null -D - "${BASE_URL}/${SHORT_ID}" | grep -i '^location:' | tr -d '\r')"
          echo "$LOCATION" | grep -q "https://www.google.com"

          HEAD_STATUS="$(curl -s -o /dev/null -I -w '%{http_code}' "${BASE_URL}/${SHORT_ID}")"
          [ "$HEAD_STATUS" = "200" ]

          DELETE_STATUS="$(curl -s -o /dev/null -X DELETE -w '%{http_code}' "${BASE_URL}/${SHORT_ID}")"
          [ "$DELETE_STATUS" = "204" ]

          STATUS="$(curl -s -o /dev/null -w '%{http_code}' "${BASE_URL}/does-not-exist")"
          [ "$STATUS" = "404" ]
