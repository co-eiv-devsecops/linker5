name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-package:
    name: Build, Test and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests and package application
        run: mvn -B -f linker5-java/pom.xml clean verify

      - name: Upload executable jar
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: linker5-jar-with-dependencies
          path: linker5-java/target/*-jar-with-dependencies.jar
          if-no-files-found: error
