name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  setup-and-checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: echo "[Setup and Checkout] Checkout"

      - name: MVNSetup
        run: echo "[Setup and Checkout] MVNSetup"

  build:
    needs: setup-and-checkout
    runs-on: ubuntu-latest
    steps:
      - name: Build
        run: echo "[Build] Build"

  continuous-integration-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: IntegrationTest
        run: echo "[Continuous Integration Tests] IntegrationTest"

      - name: UnitTests
        run: echo "[Continuous Integration Tests] UnitTests"

  static-code-analysis:
    needs: continuous-integration-tests
    runs-on: ubuntu-latest
    steps:
      - name: DependencyScan
        run: echo "[Static Code Analysis] DependencyScan"

      - name: QualityScan
        run: echo "[Static Code Analysis] QualityScan"

      - name: SecurityScan
        run: echo "[Static Code Analysis] SecurityScan"

  deploy-to-qa:
    needs: static-code-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to QA
        run: echo "[Deploy to QA] Deploy"

  post-deployment-checks-qa:
    needs: deploy-to-qa
    runs-on: ubuntu-latest
    steps:
      - name: IntegrationTest
        run: echo "[Post-Deployment Checks] IntegrationTest"

      - name: SmokeTest
        run: echo "[Post-Deployment Checks] SmokeTest"

  functional-tests:
    needs: post-deployment-checks-qa
    runs-on: ubuntu-latest
    steps:
      - name: TestLocal
        run: echo "[Functional Tests] TestLocal"

      - name: TestRemote
        run: echo "[Functional Tests] TestRemote"

  dynamic-code-analysis:
    needs: functional-tests
    runs-on: ubuntu-latest
    steps:
      - name: QualityScan
        run: echo "[Dynamic Code Analysis] QualityScan"

  deploy-to-stage:
    needs: dynamic-code-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Stage
        run: echo "[Deploy to Stage] Deploy"

  post-deployment-checks-stage:
    needs: deploy-to-stage
    runs-on: ubuntu-latest
    steps:
      - name: IntegrationTest
        run: echo "[Post-Deployment Checks] IntegrationTest"

      - name: SmokeTest
        run: echo "[Post-Deployment Checks] SmokeTest"

  non-function-tests:
    needs: post-deployment-checks-stage
    runs-on: ubuntu-latest
    steps:
      - name: Accessibility
        run: echo "[Non-Function Tests] Accessibility"

      - name: DynamicSecurityTest
        run: echo "[Non-Function Tests] DynamicSecurityTest"

      - name: LoadTest
        run: echo "[Non-Function Tests] LoadTest"

      - name: PerformanceTest
        run: echo "[Non-Function Tests] PerformanceTest"
