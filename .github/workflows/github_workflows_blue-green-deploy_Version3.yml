name: Blue-Green Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to deploy"
        required: true
        default: "main"

concurrency:
  group: blue-green-production
  cancel-in-progress: false

env:
  APP_NAME: linker5
  BLUE_HOST: blue.linker5.example.com
  GREEN_HOST: green.linker5.example.com

jobs:
  detect-active:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.detect.outputs.active }}
      inactive: ${{ steps.detect.outputs.inactive }}
    steps:
      - name: Detect active environment
        id: detect
        run: |
          set -euo pipefail

          # TODO: Replace this with your real source of truth
          # examples: current LB target, DNS record, file flag, etc.
          ACTIVE="blue"

          if [ "$ACTIVE" = "blue" ]; then
            echo "active=blue" >> "$GITHUB_OUTPUT"
            echo "inactive=green" >> "$GITHUB_OUTPUT"
          else
            echo "active=green" >> "$GITHUB_OUTPUT"
            echo "inactive=blue" >> "$GITHUB_OUTPUT"
          fi

          echo "Active=$ACTIVE"

  deploy-inactive:
    runs-on: ubuntu-latest
    needs: detect-active
    environment: ${{ needs.detect-active.outputs.inactive }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy app to inactive environment
        run: |
          set -euo pipefail

          TARGET="${{ needs.detect-active.outputs.inactive }}"
          BRANCH="${{ github.event.inputs.branch }}"

          echo "Deploying branch '$BRANCH' to '$TARGET'"

          # TODO: Replace with your real remote deploy command.
          # Your deploy script (scripts/deploy.sh) is meant to run on the target server.
          # Example concept:
          # ssh user@${TARGET}-host "cd ~/linker5 && BRANCH=$BRANCH scripts/deploy.sh"

  qa-inactive:
    runs-on: ubuntu-latest
    needs: [detect-active, deploy-inactive]
    steps:
      - name: Run smoke test on inactive
        run: |
          set -euo pipefail

          TARGET="${{ needs.detect-active.outputs.inactive }}"
          if [ "$TARGET" = "blue" ]; then
            URL="https://${BLUE_HOST}"
          else
            URL="https://${GREEN_HOST}"
          fi

          echo "Running smoke test against $URL"
          curl -fsS "$URL/"

  switch-traffic:
    runs-on: ubuntu-latest
    needs: [detect-active, qa-inactive]
    environment: production
    steps:
      - name: Switch traffic to inactive (launch)
        run: |
          set -euo pipefail

          NEW_ACTIVE="${{ needs.detect-active.outputs.inactive }}"
          OLD_ACTIVE="${{ needs.detect-active.outputs.active }}"

          echo "Switching traffic: $OLD_ACTIVE -> $NEW_ACTIVE"

          # TODO: Replace with real traffic switch command
          # examples: LB target switch, Nginx upstream symlink swap, DNS flip
          # Also persist NEW_ACTIVE as current active

  rollback-if-needed:
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    needs: [detect-active, switch-traffic]
    steps:
      - name: Roll back traffic to previous active env
        run: |
          set -euo pipefail

          PREVIOUS="${{ needs.detect-active.outputs.active }}"
          echo "Rollback traffic to $PREVIOUS"

          # TODO: Replace with real rollback command