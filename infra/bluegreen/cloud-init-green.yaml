#cloud-config
# Minimal provisioning for a blue-green "green" VM.
# It only installs a Java 21 runtime; the application jar, the systemd unit and
# the service start are delivered afterwards by the deploy step (the same
# oci-bastion-deploy flow used for prod), so green ends up identical to blue.
#
# Temurin is used (instead of the distro openjdk-21 package) because it installs
# cleanly on any Ubuntu release, including 20.04 where openjdk-21 is not in apt.

package_update: true
package_upgrade: false

packages:
  - wget
  - gnupg
  - apt-transport-https

runcmd:
  - install -d -m 0755 /etc/apt/keyrings
  - bash -c 'wget -qO - https://packages.adoptium.net/artifactory/api/gpg/key/public | gpg --dearmor -o /etc/apt/keyrings/adoptium.gpg'
  - bash -c '. /etc/os-release; echo "deb [signed-by=/etc/apt/keyrings/adoptium.gpg] https://packages.adoptium.net/artifactory/deb ${VERSION_CODENAME} main" > /etc/apt/sources.list.d/adoptium.list'
  - apt-get update
  - apt-get install -y temurin-21-jre
  # OCI Ubuntu images ship an iptables INPUT chain that REJECTs everything except
  # SSH. Open the app port (8080) so the Load Balancer health checker and traffic
  # can reach Linker, matching the blue instance, then persist it across reboots.
  - iptables -I INPUT -p tcp -m tcp --dport 8080 -m state --state NEW -j ACCEPT
  - bash -c 'netfilter-persistent save || iptables-save > /etc/iptables/rules.v4 || true'
